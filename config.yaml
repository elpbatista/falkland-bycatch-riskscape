region:
  name: falkland_islands
  crs: EPSG:4326

  bbox:
    xmin: -64
    ymin: -57
    xmax: -51
    ymax: -47

  buffer_km: 50


grid:
  system: H3
  resolution: 6


time:
  start: "2014-01-01"
  end: "2023-12-31"
  # end: "2014-01-05"


paths:
  data: "data"
  raw: "data/raw"
  processed: "data/processed"
  grids: "data/grids"
  logs: "logs"
  layer1: "data/layer1"
  plots: "plots"
  falklands: "../Data/falklands_uniqueland/Falklands_UNIQUEland_UTM21S_2017.shp"

datasets:

  sst:
    provider: podaac
    product: MUR-JPL-L4-GLOB-v4.1
    variable: analysed_sst

  chl:
    provider: copernicus
    product: cmems_obs-oc_glo_bgc-plankton_my_l4-gapfree-multi-4km_P1D
    version: 202311 # This exact version and part of the dataset will be retired on the 2026-03-31T13:00:00.000Z. For more information you can check: https://marine.copernicus.eu/user-corner/product-roadmap/transition-information
    variable: CHL

  ssh:
    provider: copernicus
    product: cmems_obs-sl_glo_phy-ssh_my_allsat-l4-duacs-0.125deg_P1D
    variable: adt
    
downloads:
  workers: 8

layer1:
  method: mean      # mean | centroid
  variables:
    - sst
    - chl
    - ssh

  transforms:
    chl: log10

  standardize: true