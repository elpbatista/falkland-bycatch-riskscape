region:
  name: falkland_islands
  crs: EPSG:4326

  bbox:
    xmin: -64
    ymin: -57
    xmax: -51
    ymax: -47

  buffer_km: 50


grid:
  system: H3
  resolution: 6


time:
  start: "2014-01-01"
  # end: "2023-12-31"
  end: "2014-01-05"


paths:
  data: "data"
  raw: "data/raw"
  processed: "data/processed"
  grids: "data/grids"
  logs: "logs"

datasets:

  sst:
    provider: podaac
    product: MUR-JPL-L4-GLOB-v4.1
    variable: analysed_sst

  chlorophyll:
    provider: copernicus
    product: cmems_obs-oc_glo_bgc-plankton_my_l4-gapfree-multi-4km_P1D
    variable: CHL

  ssh:
    provider: copernicus
    product: cmems_obs-sl_glo_phy-ssh_my_allsat-l4-duacs-0.125deg_P1D
    variable: adt
    
downloads:
  workers: 8

layer1:
  variables:
    - sst
    - chlorophyll
    - ssh

  transforms:
    chlorophyll: log10

  standardize: true