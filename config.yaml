region:
  name: falkland_islands
  crs: EPSG:4326

  bbox:
    xmin: -64
    ymin: -57
    xmax: -51
    ymax: -47

  buffer_km: 50

grid:
  resolution: 6

time:
  start: "2014-01-01"
  end: "2023-12-31"

paths:
  data: "data"
  raw: "data/raw"
  processed: "data/processed"
  grids: "data/grids"
  plots: "plots"

references:
  land: "reference/ne_10m_land/ne_10m_land.shp"
  coastline: "reference/ne_10m_coastline/ne_10m_coastline.shp"
  fisheries: "reference/fisheries_grid_squares/GridSquares.shp"
  limits: "reference/ukho_ficz_focz_limits/ukho_ficz_focz_limits.shp"

datasets:
  sst:
    role: environmental
    build_lookup: true
    provider: podaac
    product: MUR-JPL-L4-GLOB-v4.1
    variable: analysed_sst

  chl:
    role: environmental
    build_lookup: true
    provider: copernicus
    product: cmems_obs-oc_glo_bgc-plankton_my_l4-gapfree-multi-4km_P1D
    variable: CHL

  ssh:
    role: environmental
    build_lookup: true
    provider: copernicus
    product: cmems_obs-sl_glo_phy-ssh_my_allsat-l4-duacs-0.125deg_P1D
    variable: adt
    
  wind:
    role: environmental
    build_lookup: true
    provider: cds
    product: derived-era5-single-levels-daily-statistics
    variables:
      - 10m_u_component_of_wind
      - 10m_v_component_of_wind

  gfw:
    role: fishing_effort
    build_lookup: false
    provider: gfw
  
  bathymetry:
    role: static
    build_lookup: true
    provider: gebco
    product: GEBCO_2026
    source: ceda_opendap
    ceda_archive_path: /bodc/gebco/global/gebco_2026/ice_surface_elevation/netcdf/GEBCO_2026.nc
    opendap_base_url: https://dap.ceda.ac.uk/thredds/dodsC
    variable: elevation

downloads:
  workers: 8

gfw:
  # Set the API token with GFW_TOKEN in a local .env file or environment.
  request_delay_seconds: 65
